<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mahan Choudhury — Spending Tracker</title>
<meta name="theme-color" content="#0b0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spending">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0b0f1a; --panel:rgba(255,255,255,0.04); --panel2:rgba(255,255,255,0.06);
    --stroke:rgba(255,255,255,0.09); --stroke2:rgba(255,255,255,0.14);
    --txt:#eef2ff; --muted:#93a0bf; --faint:#5f6c8a;
    --gold:#d9b25f; --gold2:#f2d089; --emerald:#34d399; --rose:#fb7185; --sky:#5eb1ff; --violet:#a78bfa;
    --shadow:0 18px 50px rgba(0,0,0,.45); --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 12% -8%, rgba(217,178,95,.10), transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, rgba(94,177,255,.08), transparent 55%),
      var(--bg);
    color:var(--txt); min-height:100vh; padding:18px; -webkit-font-smoothing:antialiased;
    padding-top:calc(18px + env(safe-area-inset-top));
  }
  .wrap{max-width:1240px;margin:0 auto}
  .accountbar{display:none;align-items:center;justify-content:flex-end;gap:12px;font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .accountbar .sync{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--stroke);padding:5px 11px;border-radius:99px}
  .accountbar .who{color:var(--txt)}
  .accountbar button{background:var(--panel);border:1px solid var(--stroke);color:var(--muted);padding:5px 11px;border-radius:99px;cursor:pointer;font-size:12px}
  .accountbar button:hover{color:var(--txt);border-color:var(--stroke2)}
  header.app{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#241a06;font-size:22px;box-shadow:0 8px 24px rgba(217,178,95,.35)}
  .brand h1{font-size:20px;font-weight:700;letter-spacing:.3px}
  .brand p{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .profiles{display:flex;gap:6px;background:var(--panel);border:1px solid var(--stroke);padding:5px;border-radius:14px}
  .profiles button{background:transparent;border:none;color:var(--muted);padding:9px 18px;border-radius:10px;font-weight:600;cursor:pointer;font-size:13.5px;transition:.2s;display:flex;align-items:center;gap:7px}
  .profiles button.active{background:linear-gradient(135deg,rgba(217,178,95,.22),rgba(217,178,95,.08));color:var(--gold2);box-shadow:inset 0 0 0 1px rgba(217,178,95,.35)}
  .controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:22px}
  select,input{font-family:inherit;color:var(--txt);background:var(--panel);border:1px solid var(--stroke);border-radius:11px;padding:11px 13px;font-size:14px;outline:none;transition:.15s}
  select:focus,input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(217,178,95,.15)}
  select option{background:#11182a}
  .seg{display:flex;background:var(--panel);border:1px solid var(--stroke);border-radius:11px;overflow:hidden}
  .seg button{background:transparent;border:none;color:var(--muted);padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600}
  .seg button.active{background:var(--panel2);color:var(--txt)}
  .spacer{flex:1}
  .btn{background:var(--panel);border:1px solid var(--stroke);color:var(--txt);padding:10px 15px;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--stroke2);background:var(--panel2)}
  .btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#241a06;border:none;box-shadow:0 8px 22px rgba(217,178,95,.30)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px}
  .card{background:var(--panel);border:1px solid var(--stroke);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;backdrop-filter:blur(8px)}
  .card .label{font-size:11.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);margin-bottom:9px;font-weight:600}
  .card .val{font-size:25px;font-weight:750;letter-spacing:.3px}
  .card .sub{font-size:12px;color:var(--faint);margin-top:5px}
  .card .accent{position:absolute;top:0;left:0;height:3px;width:100%}
  .a-gold{background:linear-gradient(90deg,var(--gold),transparent)}
  .a-em{background:linear-gradient(90deg,var(--emerald),transparent)}
  .a-rose{background:linear-gradient(90deg,var(--rose),transparent)}
  .a-sky{background:linear-gradient(90deg,var(--sky),transparent)}
  .a-violet{background:linear-gradient(90deg,var(--violet),transparent)}
  .pos{color:var(--emerald)} .neg{color:var(--rose)}
  .coach{background:linear-gradient(135deg,rgba(52,211,153,.08),rgba(94,177,255,.05));border:1px solid var(--stroke);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .coach .ic{width:44px;height:44px;border-radius:12px;background:rgba(52,211,153,.14);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .coach .msg{flex:1;min-width:240px}
  .coach .msg b{color:var(--gold2)}
  .coach .msg .big{font-size:16px;font-weight:600;margin-bottom:3px}
  .coach .msg .small{font-size:13px;color:var(--muted)}
  .budgetbox{display:flex;align-items:center;gap:8px}
  .budgetbox input{width:120px}
  .progress{height:9px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-top:10px;width:100%}
  .progress > div{height:100%;border-radius:99px;transition:width .5s}
  .grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:18px;align-items:start}
  @media(max-width:980px){.grid2{grid-template-columns:1fr}.controls .spacer{display:none}}
  .panel{background:var(--panel);border:1px solid var(--stroke);border-radius:var(--radius);padding:20px}
  .panel h2{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
  .panel h2 .tag{font-size:11px;color:var(--muted);font-weight:600}
  .addform{display:grid;grid-template-columns:1.1fr 1.5fr 1fr 1fr .8fr auto auto;gap:9px}
  .fixedchk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--stroke);border-radius:11px;padding:0 12px;cursor:pointer;white-space:nowrap}
  .fixedchk input{width:auto;margin:0}
  .pin{background:transparent;border:none;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:6px;opacity:.25;filter:grayscale(1)}
  .pin.on{opacity:1;filter:none}
  .pin:hover{background:var(--panel2)}
  .fixedtag{display:inline-block;font-size:10px;font-weight:700;color:var(--gold2);background:rgba(217,178,95,.14);border:1px solid rgba(217,178,95,.3);padding:1px 6px;border-radius:99px;text-transform:uppercase;letter-spacing:.5px}
  @media(max-width:760px){.addform{grid-template-columns:1fr 1fr}}
  .addform input,.addform select{width:100%;padding:10px 11px;font-size:13px}
  .addform .add{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#241a06;border:none;border-radius:11px;font-weight:700;cursor:pointer;font-size:18px;padding:0 16px}
  .week{margin-top:14px;border:1px solid var(--stroke);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.015)}
  .week-head{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer;user-select:none}
  .week-head:hover{background:var(--panel2)}
  .week-head .wl{display:flex;align-items:center;gap:11px}
  .week-head .num{width:26px;height:26px;border-radius:8px;background:rgba(217,178,95,.16);color:var(--gold2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .week-head .wr{font-weight:700;font-size:14.5px}
  .week-head .range{font-size:11.5px;color:var(--faint)}
  .week-sum{font-weight:700;font-size:14px}
  .week-body{padding:0 8px 8px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:8px 10px;border-bottom:1px solid var(--stroke)}
  td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
  tr:last-child td{border-bottom:none}
  .amt{text-align:right;font-weight:650;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;background:var(--panel2);border:1px solid var(--stroke)}
  .purpose{font-size:11px;color:var(--muted)}
  .del{background:transparent;border:none;color:var(--faint);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:6px}
  .del:hover{color:var(--rose);background:rgba(251,113,133,.1)}
  .empty{padding:26px;text-align:center;color:var(--faint);font-size:13px}
  .chartbox{position:relative;height:230px;margin-top:6px}
  .chartbox.tall{height:260px}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .legend span{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .mb18{margin-bottom:18px}
  .filters{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
  .filters input,.filters select{flex:1;min-width:120px}
  footer{margin-top:26px;text-align:center;color:var(--faint);font-size:12px;line-height:1.7}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#11182a;border:1px solid var(--stroke2);padding:13px 20px;border-radius:12px;font-size:13.5px;opacity:0;transition:.3s;z-index:80;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* Login */
  .login{position:fixed;inset:0;background:radial-gradient(900px 500px at 50% -10%,rgba(217,178,95,.14),transparent 60%),var(--bg);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .login.show{display:flex}
  .loginbox{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--stroke);border-radius:20px;padding:30px 26px;text-align:center;box-shadow:var(--shadow)}
  .loginbox .logo{width:58px;height:58px;border-radius:16px;margin:0 auto 16px;font-size:28px}
  .loginbox h2{font-size:19px;margin-bottom:6px}
  .loginbox p{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
  .loginbox input{width:100%;margin-bottom:11px;text-align:center}
  .loginbox .btn{width:100%;justify-content:center;margin-bottom:10px;padding:13px}
  .gbtn{width:100%;justify-content:center;display:flex;align-items:center;gap:9px;background:#fff;color:#222;border:none;padding:13px;border-radius:11px;font-weight:600;font-size:14px;cursor:pointer}
  .divider{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:11px;margin:14px 0;text-transform:uppercase;letter-spacing:1px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--stroke)}
  .login .note{font-size:11.5px;color:var(--faint);margin-top:16px;line-height:1.5}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}
</style>
</head>
<body>
<!-- LOGIN -->
<div class="login" id="login">
  <div class="loginbox">
    <div class="logo">M</div>
    <h2>Spending Tracker</h2>
    <p>Sign in to sync your data securely across your laptop and phone.</p>
    <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email">
    <button class="btn gold" id="magicBtn">Email me a sign-in link</button>
    <div class="divider" id="orDiv">or</div>
    <button class="gbtn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="note" id="loginNote">We'll email you a one-time link — no password to remember.</div>
  </div>
</div>

<div class="wrap" id="appwrap" style="display:none">
  <div class="accountbar" id="accountbar"></div>
  <header class="app">
    <div class="brand">
      <div class="logo">M</div>
      <div><h1>Mahan Choudhury</h1><p>Premium Spending Tracker</p></div>
    </div>
    <div class="profiles" id="profiles"></div>
  </header>

  <div class="controls">
    <select id="yearSel"></select>
    <select id="monthSel"></select>
    <div class="seg" id="curSeg">
      <button data-cur="CAD" class="active">CAD $</button>
      <button data-cur="USD">USD $</button>
      <button data-cur="EUR">EUR €</button>
      <button data-cur="GBP">GBP £</button>
      <button data-cur="BDT">BDT ৳</button>
      <button data-cur="INR">INR ₹</button>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="csvBtn">⬇ CSV</button>
    <button class="btn" id="backupBtn">💾 Backup</button>
    <button class="btn" id="restoreBtn">⬆ Restore</button>
    <input type="file" id="restoreFile" accept="application/json" style="display:none">
  </div>

  <div class="stats" id="stats"></div>
  <div class="coach" id="coach"></div>

  <div class="grid2">
    <div>
      <div class="panel mb18">
        <h2>Add Expense <span class="tag" id="addHint"></span></h2>
        <div class="addform">
          <input type="date" id="fDate">
          <input type="text" id="fDesc" placeholder="Description (e.g. No Frills)">
          <select id="fCat"></select>
          <input type="text" id="fPurpose" placeholder="Purpose / Project" list="purposeList">
          <input type="number" id="fAmt" placeholder="0.00" step="0.01" min="0">
          <label class="fixedchk" title="Fixed / recurring (e.g. rent) — kept out of the daily pace"><input type="checkbox" id="fFixed"> Fixed</label>
          <button class="add" id="addBtn" title="Add entry">＋</button>
        </div>
        <datalist id="purposeList"></datalist>
        <div class="filters">
          <input type="text" id="search" placeholder="🔎 Search description…">
          <select id="catFilter"><option value="">All categories</option></select>
          <select id="purposeFilter"><option value="">All purposes</option></select>
        </div>
      </div>
      <div class="panel">
        <h2>This Month, by Week <span class="tag" id="weekTag"></span></h2>
        <div id="weeks"></div>
      </div>
    </div>
    <div>
      <div class="panel mb18">
        <h2>Spending by Category</h2>
        <div class="chartbox"><canvas id="catChart"></canvas></div>
        <div class="legend" id="catLegend"></div>
      </div>
      <div class="panel mb18">
        <h2>Weekly Breakdown</h2>
        <div class="chartbox"><canvas id="weekChart"></canvas></div>
      </div>
      <div class="panel">
        <h2>Year Trend <span class="tag" id="yearTag"></span></h2>
        <div class="chartbox tall"><canvas id="yearChart"></canvas></div>
      </div>
    </div>
  </div>
  <footer id="footerNote"></footer>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   CONFIG — paste your two Supabase values between the quotes.
   Until you do, the app runs fully offline on this device.
   ============================================================ */
const SUPABASE_URL      = "https://zwcvjpjzkyzttuajbnvg.supabase.co/rest/v1/";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3Y3ZqcGp6a3l6dHR1YWpibnZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzU0MjksImV4cCI6MjA5NzMxMTQyOX0.s6jXlVuBQbNg1mri1-Xu8L5cA7y_91_Rq3D4dGcH3Ks";
/* ============================================================ */

const CLOUD = !SUPABASE_URL.startsWith("PASTE") && !SUPABASE_ANON_KEY.startsWith("PASTE");
const STORE_KEY = "mc_spendtrack_v1";
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const CUR_SYM = {CAD:"$",USD:"$",EUR:"€",GBP:"£",BDT:"৳",INR:"₹"};
const PALETTE = ["#d9b25f","#34d399","#5eb1ff","#a78bfa","#fb7185","#fbbf24","#22d3ee","#f472b6","#84cc16","#fb923c","#94a3b8","#2dd4bf"];

let DB=null, view={year:2026,month:6}, charts={}, supa=null, USER=null, wired=false, saveTimer=null, lastUpdated=null;

/* ---------- Seed ---------- */
function seed(){
  return {activeProfile:"personal", profiles:{
    personal:{name:"Personal",icon:"👤",currency:"CAD",
      categories:["Housing","Groceries","Dining","Transport","Shopping","Health","Household","Utilities","Entertainment","Subscriptions","Other"],
      budgets:{"2026-6":1500},
      entries:[
        e("2026-06-01","House Rent","Housing","Monthly",725,true),
        e("2026-06-02","No Frills","Groceries","",33.28),
        e("2026-06-02","Uber","Transport","",12.94),
        e("2026-06-03","Canada Computer","Shopping","",28.24),
        e("2026-06-04","Chocolate","Dining","",5.05),
        e("2026-06-04","Ankle Brace (Amazon)","Health","",38.77),
        e("2026-06-05","Dollarama","Household","",15.52),
        e("2026-06-06","Juice","Dining","",16.92),
        e("2026-06-08","Nations","Groceries","",77.32),
        e("2026-06-08","Cafe Peyala","Dining","",16.79),
        e("2026-06-09","No Frills","Groceries","",36.89),
        e("2026-06-10","Food Basics","Groceries","",29.58),
        e("2026-06-10","Samir SuperMarket (Mustard Oil)","Groceries","",13.00),
        e("2026-06-11","Uber","Transport","",7.20),
        e("2026-06-12","Lyft Ride","Transport","",28.00),
        e("2026-06-15","Starbucks","Dining","",21.75),
        e("2026-06-17","Starbucks","Dining","",3.80)
      ]},
    event:{name:"Event",icon:"🎉",currency:"CAD",
      categories:["Venue","Catering","Decor","Staff","Equipment","Marketing","Transport","Rentals","Permits","Gifts","Misc"],
      budgets:{}, entries:[]}
  }};
}
function e(date,desc,cat,purpose,amt,fixed){return {id:uid(),date,desc,category:cat,purpose:purpose||"",amount:+amt,fixed:!!fixed};}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* ---------- Persistence ---------- */
function loadLocal(){ try{const r=localStorage.getItem(STORE_KEY); if(r)return JSON.parse(r);}catch(_){} const s=seed(); try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(_){} return s; }
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }catch(_){}
  if(CLOUD && USER){ clearTimeout(saveTimer); setSync("⟳ Saving…","var(--gold2)"); saveTimer=setTimeout(pushCloud,700); }
}
async function pushCloud(){
  if(!(CLOUD&&USER))return;
  const ts=new Date().toISOString();
  try{
    const {error}=await supa.from("user_data").upsert({user_id:USER.id,data:DB,updated_at:ts});
    if(error)throw error;
    lastUpdated=ts; setSync("☁ Synced","var(--emerald)");
  }catch(err){ setSync("⚠ Offline — saved here","var(--rose)"); }
}
async function loadCloud(){
  let row=null;
  try{ const {data}=await supa.from("user_data").select("data,updated_at").eq("user_id",USER.id).maybeSingle(); row=data; }catch(_){}
  if(row && row.data && row.data.profiles){ DB=row.data; lastUpdated=row.updated_at; setSync("☁ Synced","var(--emerald)"); }
  else { DB=loadLocal(); pushCloud(); }
  startApp();
}
async function pullIfNewer(){
  if(!(CLOUD&&USER))return;
  try{
    const {data}=await supa.from("user_data").select("updated_at").eq("user_id",USER.id).maybeSingle();
    if(data && data.updated_at && data.updated_at!==lastUpdated){
      const {data:full}=await supa.from("user_data").select("data,updated_at").eq("user_id",USER.id).maybeSingle();
      if(full && full.data && full.data.profiles){ DB=full.data; lastUpdated=full.updated_at; renderAll(); setSync("☁ Updated","var(--sky)"); }
    }
  }catch(_){}
}
function P(){ return DB.profiles[DB.activeProfile]; }

/* ---------- Auth ---------- */
async function boot(){
  if(!CLOUD){ DB=loadLocal(); document.getElementById("appwrap").style.display="block"; startApp(); return; }
  supa = window.supabase.createClient(SUPABASE_URL.trim().replace(/\/(rest|auth)\/v1\/?$/i,"").replace(/\/+$/,""), SUPABASE_ANON_KEY.trim());
  supa.auth.onAuthStateChange((_ev,session)=>handleAuth(session));
  const { data:{ session } } = await supa.auth.getSession();
  handleAuth(session);
  wireLogin();
}
function handleAuth(session){
  if(session && session.user){
    USER=session.user;
    document.getElementById("login").classList.remove("show");
    document.getElementById("appwrap").style.display="block";
    document.getElementById("accountbar").style.display="flex";
    loadCloud();
  } else {
    USER=null;
    document.getElementById("appwrap").style.display="none";
    document.getElementById("login").classList.add("show");
  }
}
function wireLogin(){
  document.getElementById("magicBtn").onclick=async()=>{
    const email=document.getElementById("loginEmail").value.trim();
    if(!email){ toast("Enter your email"); return; }
    document.getElementById("magicBtn").textContent="Sending…";
    const {error}=await supa.auth.signInWithOtp({email,options:{emailRedirectTo:location.href.split("#")[0].split("?")[0]}});
    document.getElementById("magicBtn").textContent="Email me a sign-in link";
    document.getElementById("loginNote").innerHTML = error? "⚠ "+error.message : "✅ Check your inbox — tap the link on this device.";
  };
  document.getElementById("googleBtn").onclick=async()=>{
    const {error}=await supa.auth.signInWithOAuth({provider:"google",options:{redirectTo:location.href.split("#")[0].split("?")[0]}});
    if(error)document.getElementById("loginNote").textContent="⚠ "+error.message;
  };
}
function renderAccount(){
  const el=document.getElementById("accountbar");
  if(!CLOUD){ el.innerHTML=`<span class="sync">🔒 Local only — data stays on this device</span>`; el.style.display="flex"; return; }
  el.innerHTML=`<span class="sync" id="syncPill">☁ Synced</span>
    <span class="who">${USER?escapeHtml(USER.email||"Signed in"):""}</span>
    <button id="signout">Sign out</button>`;
  document.getElementById("signout").onclick=async()=>{ await supa.auth.signOut(); toast("Signed out"); };
}
function setSync(text,color){ const p=document.getElementById("syncPill"); if(p){ p.textContent=text; p.style.color=color||"var(--muted)"; } }

/* ---------- Helpers ---------- */
function sym(){ return CUR_SYM[P().currency]||"$"; }
function money(n){ return sym()+(n<0?"-":"")+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function ymKey(y,m){ return y+"-"+m; }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function pad(n){ return n<10?"0"+n:""+n; }
function monthEntries(){ const pre=view.year+"-"+pad(view.month); return P().entries.filter(x=>x.date.startsWith(pre)); }
function weekOf(day){ return Math.min(5,Math.floor((day-1)/7)+1); }
function weekRange(w){ const dim=daysInMonth(view.year,view.month); const s=(w-1)*7+1, en=Math.min(w*7,dim); if(s>dim)return null; return [s,en]; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------- Render ---------- */
function renderProfiles(){
  const el=document.getElementById("profiles"); el.innerHTML="";
  Object.keys(DB.profiles).forEach(key=>{
    const p=DB.profiles[key]; const b=document.createElement("button");
    b.className=key===DB.activeProfile?"active":""; b.innerHTML=`<span>${p.icon||""}</span> ${p.name}`;
    b.onclick=()=>{ DB.activeProfile=key; save(); syncCurrencySeg(); renderAll(); };
    el.appendChild(b);
  });
}
function syncCurrencySeg(){ document.querySelectorAll("#curSeg button").forEach(b=>b.classList.toggle("active",b.dataset.cur===P().currency)); }
function fillSelectors(){
  const ys=document.getElementById("yearSel"); ys.innerHTML="";
  for(let y=2025;y<=2030;y++){const o=document.createElement("option");o.value=y;o.textContent=y;if(y===view.year)o.selected=true;ys.appendChild(o);}
  const ms=document.getElementById("monthSel"); ms.innerHTML="";
  MONTHS.forEach((m,i)=>{const o=document.createElement("option");o.value=i+1;o.textContent=m;if(i+1===view.month)o.selected=true;ms.appendChild(o);});
  const fc=document.getElementById("fCat"); fc.innerHTML="";
  P().categories.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;fc.appendChild(o);});
  const on=document.createElement("option");on.value="__new";on.textContent="＋ New category…";fc.appendChild(on);
  const cf=document.getElementById("catFilter"); cf.innerHTML='<option value="">All categories</option>';
  P().categories.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;cf.appendChild(o);});
  const purposes=[...new Set(P().entries.map(x=>x.purpose).filter(Boolean))];
  const pl=document.getElementById("purposeList"); pl.innerHTML="";
  const pf=document.getElementById("purposeFilter"); pf.innerHTML='<option value="">All purposes</option>';
  purposes.forEach(pn=>{const o=document.createElement("option");o.value=pn;pl.appendChild(o);const o2=document.createElement("option");o2.value=pn;o2.textContent=pn;pf.appendChild(o2);});
  document.getElementById("addHint").textContent = DB.activeProfile==="event"?"use Purpose = event name":"unlimited entries";
}
function filteredMonthEntries(){
  const s=document.getElementById("search").value.toLowerCase();
  const cf=document.getElementById("catFilter").value, pf=document.getElementById("purposeFilter").value;
  return monthEntries().filter(x=>(!s||x.desc.toLowerCase().includes(s))&&(!cf||x.category===cf)&&(!pf||x.purpose===pf));
}
function renderStats(){
  const ents=monthEntries(); const spent=ents.reduce((a,b)=>a+b.amount,0);
  const ym=ymKey(view.year,view.month); const budget=P().budgets[ym]||0; const remaining=budget-spent;
  const dim=daysInMonth(view.year,view.month); const now=new Date();
  const isCurrent=now.getFullYear()===view.year&&(now.getMonth()+1)===view.month;
  const isPast=(view.year<now.getFullYear())||(view.year===now.getFullYear()&&view.month<now.getMonth()+1);
  const fixedSpent=ents.filter(x=>x.fixed).reduce((a,b)=>a+b.amount,0); const variable=spent-fixedSpent;
  let projected=isCurrent?fixedSpent+(now.getDate()>0?(variable/now.getDate())*dim:variable):spent;
  const avg=ents.length?spent/(isCurrent?now.getDate():dim):0;
  const cards=[
    {l:"Spent This Month",v:money(spent),s:ents.length+" entries",a:"a-gold"},
    {l:"Monthly Budget",v:budget?money(budget):"— set below",s:budget?(Math.round(spent/budget*100)+"% used"):"no budget yet",a:"a-sky"},
    {l:"Remaining",v:budget?money(remaining):"—",s:budget?(remaining>=0?"in budget":"over budget"):"",a:remaining>=0?"a-em":"a-rose",c:budget?(remaining>=0?"pos":"neg"):""},
    {l:isCurrent?"Projected Month-End":"Month Total",v:money(projected),s:isCurrent?"at current pace":(isPast?"final":"planned"),a:"a-violet",c:(budget&&projected>budget)?"neg":""},
    {l:"Avg / Day",v:money(avg),s:isCurrent?("day "+now.getDate()+" of "+dim):(dim+" days"),a:"a-gold"}
  ];
  document.getElementById("stats").innerHTML=cards.map(c=>`<div class="card"><div class="accent ${c.a}"></div><div class="label">${c.l}</div><div class="val ${c.c||""}">${c.v}</div><div class="sub">${c.s}</div></div>`).join("");
}
function renderCoach(){
  const el=document.getElementById("coach"); const ents=monthEntries(); const spent=ents.reduce((a,b)=>a+b.amount,0);
  const ym=ymKey(view.year,view.month); const budget=P().budgets[ym]||0; const dim=daysInMonth(view.year,view.month);
  const now=new Date(); const isCurrent=now.getFullYear()===view.year&&(now.getMonth()+1)===view.month;
  const budgetInput=`<div class="budgetbox"><span style="font-size:13px;color:var(--muted)">Budget</span><input type="number" id="budgetInput" placeholder="0" value="${budget||""}" step="50" min="0"><button class="btn gold" id="setBudget">Set</button></div>`;
  let icon="🧭",big,small="",bar="";
  if(!budget){ big=`Set a monthly budget to unlock your <b>smart spending coach</b>.`; small=`It tells you how much you can safely spend each remaining day, and projects your month-end total.`; }
  else{
    const remaining=budget-spent; const pct=Math.min(100,Math.round(spent/budget*100));
    const barColor=spent>budget?"var(--rose)":(spent>budget*0.85?"var(--gold)":"var(--emerald)");
    bar=`<div class="progress"><div style="width:${pct}%;background:${barColor}"></div></div>`;
    if(isCurrent){
      const daysLeft=dim-now.getDate()+1; const perDay=daysLeft>0?remaining/daysLeft:remaining;
      const fixedSpent=ents.filter(x=>x.fixed).reduce((a,b)=>a+b.amount,0); const variable=spent-fixedSpent;
      const projected=fixedSpent+(variable/now.getDate())*dim;
      if(remaining<0){ icon="🚨"; big=`You're <b class="neg">${money(-remaining)} over</b> budget with ${daysLeft} day(s) left.`; small=`At your current pace you'll finish near <b>${money(projected)}</b> (fixed costs counted once, not averaged). Consider pausing non-essentials.`; }
      else{ icon=perDay<(budget/dim)*0.6?"⚠️":"✅"; big=`You can spend about <b>${money(perDay)}/day</b> for the remaining ${daysLeft} day(s).`; small=`Spent ${money(spent)} of ${money(budget)} (${pct}%)${fixedSpent>0?` · ${money(fixedSpent)} fixed`:''}. Projected month-end <span style="color:var(--faint)">(fixed excluded from pace)</span>: <b>${money(projected)}</b> ${projected>budget?'<span class="neg">(over)</span>':'<span class="pos">(under)</span>'}.`; }
    } else {
      if(remaining<0){ icon="🚨"; big=`Over budget by <b class="neg">${money(-remaining)}</b>.`; small=`Spent ${money(spent)} of ${money(budget)} (${pct}%).`; }
      else { icon="📅"; big=`${money(remaining)} unused — <b>${money(remaining/dim)}/day</b> average headroom.`; small=`Spent ${money(spent)} of ${money(budget)} (${pct}%).`; }
    }
  }
  el.innerHTML=`<div class="ic">${icon}</div><div class="msg"><div class="big">${big}</div><div class="small">${small}</div>${bar}</div>${budgetInput}`;
  document.getElementById("setBudget").onclick=()=>{ const v=parseFloat(document.getElementById("budgetInput").value)||0; P().budgets[ym]=v; save(); renderAll(); toast(v?("Budget set to "+money(v)):"Budget cleared"); };
  document.getElementById("budgetInput").addEventListener("keydown",ev=>{ if(ev.key==="Enter")document.getElementById("setBudget").click(); });
}
function renderWeeks(){
  const host=document.getElementById("weeks"); const ents=filteredMonthEntries();
  document.getElementById("weekTag").textContent=MONTHS[view.month-1]+" "+view.year;
  let html="",any=false;
  for(let w=1;w<=5;w++){
    const rg=weekRange(w); if(!rg)continue;
    const we=ents.filter(x=>{const d=+x.date.slice(8,10);return d>=rg[0]&&d<=rg[1];}).sort((a,b)=>a.date.localeCompare(b.date));
    const sub=we.reduce((a,b)=>a+b.amount,0); if(we.length)any=true;
    html+=`<div class="week"><div class="week-head" onclick="toggleWeek(this)"><div class="wl"><span class="num">${w}</span><div><div class="wr">Week ${w}</div><div class="range">${MONTHS[view.month-1].slice(0,3)} ${rg[0]} – ${rg[1]}</div></div></div><div class="week-sum">${money(sub)}</div></div>
      <div class="week-body" style="display:${we.length?"block":"none"}">${we.length?`<table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="amt">Amount</th><th></th></tr></thead><tbody>${we.map(x=>`<tr><td>${x.date.slice(8,10)} ${MONTHS[view.month-1].slice(0,3)}</td><td>${escapeHtml(x.desc)}${x.purpose?`<div class="purpose">↳ ${escapeHtml(x.purpose)}</div>`:""}</td><td><span class="pill">${escapeHtml(x.category)}</span>${x.fixed?' <span class="fixedtag">fixed</span>':''}</td><td class="amt">${money(x.amount)}</td><td style="white-space:nowrap"><button class="pin ${x.fixed?'on':''}" title="Toggle fixed/recurring" onclick="toggleFixed('${x.id}')">📌</button><button class="del" onclick="delEntry('${x.id}')">✕</button></td></tr>`).join("")}</tbody></table>`:`<div class="empty">No expenses this week</div>`}</div></div>`;
  }
  if(!any && monthEntries().length===0) html=`<div class="empty">No expenses yet for ${MONTHS[view.month-1]} ${view.year}.<br>Add your first one above ☝️</div>`;
  host.innerHTML=html;
}
window.toggleWeek=function(h){const b=h.nextElementSibling;b.style.display=b.style.display==="none"?"block":"none";};
window.toggleFixed=function(id){const en=P().entries.find(x=>x.id===id);if(en){en.fixed=!en.fixed;save();renderAll();toast(en.fixed?"Marked as fixed":"Marked as variable");}};
function renderCharts(){
  const ents=monthEntries(); const byCat={}; ents.forEach(x=>byCat[x.category]=(byCat[x.category]||0)+x.amount);
  const cl=Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]); const cv=cl.map(c=>byCat[c]);
  drawDoughnut("catChart",cl,cv); const total=cv.reduce((a,b)=>a+b,0);
  document.getElementById("catLegend").innerHTML=cl.map((c,i)=>`<span><i style="background:${PALETTE[i%PALETTE.length]}"></i>${c} · ${total?Math.round(byCat[c]/total*100):0}%</span>`).join("");
  const wl=[],wv=[];
  for(let w=1;w<=5;w++){const rg=weekRange(w);if(!rg)continue;wl.push("W"+w);wv.push(ents.filter(x=>{const d=+x.date.slice(8,10);return d>=rg[0]&&d<=rg[1];}).reduce((a,b)=>a+b.amount,0));}
  drawBar("weekChart",wl,wv);
  const yl=MONTHS.map(m=>m.slice(0,3)),yv=[];
  for(let m=1;m<=12;m++){const pre=view.year+"-"+pad(m);yv.push(P().entries.filter(x=>x.date.startsWith(pre)).reduce((a,b)=>a+b.amount,0));}
  document.getElementById("yearTag").textContent=view.year; drawLine("yearChart",yl,yv);
}
function baseOpts(extra){return Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+money(c.parsed.y!=null?c.parsed.y:c.parsed)}}}},extra||{});}
function gridScale(){return {x:{ticks:{color:"#93a0bf"},grid:{display:false}},y:{ticks:{color:"#93a0bf",callback:v=>sym()+v},grid:{color:"rgba(255,255,255,.05)"}}};}
function drawDoughnut(id,labels,vals){ if(charts[id])charts[id].destroy(); const ctx=document.getElementById(id); if(!vals.length){ctx.getContext("2d").clearRect(0,0,ctx.width,ctx.height);return;} charts[id]=new Chart(ctx,{type:"doughnut",data:{labels,datasets:[{data:vals,backgroundColor:labels.map((_,i)=>PALETTE[i%PALETTE.length]),borderColor:"#0b0f1a",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"62%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+c.label+": "+money(c.parsed)}}}}}); }
function drawBar(id,labels,vals){ if(charts[id])charts[id].destroy(); charts[id]=new Chart(document.getElementById(id),{type:"bar",data:{labels,datasets:[{data:vals,backgroundColor:"rgba(217,178,95,.75)",borderRadius:7,maxBarThickness:48}]},options:baseOpts({scales:gridScale()})}); }
function drawLine(id,labels,vals){ if(charts[id])charts[id].destroy(); const ctx=document.getElementById(id).getContext("2d"); const g=ctx.createLinearGradient(0,0,0,260); g.addColorStop(0,"rgba(52,211,153,.35)"); g.addColorStop(1,"rgba(52,211,153,0)"); charts[id]=new Chart(ctx,{type:"line",data:{labels,datasets:[{data:vals,borderColor:"#34d399",backgroundColor:g,fill:true,tension:.35,pointBackgroundColor:"#34d399",pointRadius:3}]},options:baseOpts({scales:gridScale()})}); }

function renderAll(){ renderAccount(); renderProfiles(); fillSelectors(); renderStats(); renderCoach(); renderWeeks(); renderCharts(); }

/* ---------- Actions ---------- */
function addEntry(){
  const date=document.getElementById("fDate").value, desc=document.getElementById("fDesc").value.trim();
  const cat=document.getElementById("fCat").value, purpose=document.getElementById("fPurpose").value.trim();
  const amt=parseFloat(document.getElementById("fAmt").value);
  const fixed=document.getElementById("fFixed").checked;
  if(!date){toast("Pick a date");return;} if(!desc){toast("Add a description");return;} if(!(amt>0)){toast("Enter an amount");return;}
  P().entries.push(e(date,desc,cat,purpose,amt,fixed)); save();
  view.year=+date.slice(0,4); view.month=+date.slice(5,7);
  document.getElementById("fDesc").value=""; document.getElementById("fAmt").value=""; document.getElementById("fPurpose").value=""; document.getElementById("fFixed").checked=false;
  renderAll(); toast("Added "+money(amt)+" · "+desc);
}
window.delEntry=function(id){ P().entries=P().entries.filter(x=>x.id!==id); save(); renderAll(); toast("Entry removed"); };
function exportCSV(){
  const rows=[["Profile","Date","Week","Description","Category","Purpose","Amount("+P().currency+")"]];
  P().entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(x=>{const d=+x.date.slice(8,10);rows.push([P().name,x.date,"W"+weekOf(d),x.desc,x.category,x.purpose,x.amount.toFixed(2)]);});
  download(new Blob([rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n")],{type:"text/csv"}),P().name+"_expenses.csv"); toast("CSV exported");
}
function backup(){ download(new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}),"spending_backup_"+new Date().toISOString().slice(0,10)+".json"); toast("Backup downloaded"); }
function restore(file){ const r=new FileReader(); r.onload=()=>{try{const d=JSON.parse(r.result); if(d.profiles){DB=d; save(); syncCurrencySeg(); renderAll(); toast("Backup restored");} else toast("Invalid backup file");}catch(_){toast("Could not read file");}}; r.readAsText(file); }
function download(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=u;a.download=name;a.click(); setTimeout(()=>URL.revokeObjectURL(u),1500); }
let toastT; function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }

/* ---------- Start ---------- */
function startApp(){
  const now=new Date();
  view.year=(now.getFullYear()>=2025&&now.getFullYear()<=2030)?now.getFullYear():2026;
  view.month=now.getMonth()+1;
  const pre=view.year+"-"+pad(view.month);
  if(P().entries.filter(x=>x.date.startsWith(pre)).length===0 && DB.activeProfile==="personal"){ view.year=2026; view.month=6; }
  document.getElementById("fDate").value=now.toISOString().slice(0,10);
  document.getElementById("footerNote").innerHTML = CLOUD
    ? `Your data is stored privately in your account and syncs across devices.<br>Tip: on Android, open the browser menu and choose <b>Add to Home screen</b> to install this as an app.`
    : `Running in <b>local mode</b> — data is saved in this browser only. Add your Supabase keys in the file to enable cross-device sync.`;
  syncCurrencySeg();
  if(!wired){ wireApp(); wired=true; }
  renderAll();
}
function wireApp(){
  document.getElementById("yearSel").onchange=ev=>{view.year=+ev.target.value;renderAll();};
  document.getElementById("monthSel").onchange=ev=>{view.month=+ev.target.value;renderAll();};
  document.querySelectorAll("#curSeg button").forEach(b=>b.onclick=()=>{P().currency=b.dataset.cur;save();syncCurrencySeg();renderAll();toast("Currency: "+b.dataset.cur);});
  document.getElementById("addBtn").onclick=addEntry;
  document.getElementById("fAmt").addEventListener("keydown",ev=>{if(ev.key==="Enter")addEntry();});
  document.getElementById("fCat").onchange=ev=>{ if(ev.target.value==="__new"){const n=prompt("New category name:"); if(n&&n.trim()){P().categories.push(n.trim());save();fillSelectors();document.getElementById("fCat").value=n.trim();}else ev.target.selectedIndex=0;} };
  ["search","catFilter","purposeFilter"].forEach(id=>document.getElementById(id).addEventListener("input",renderWeeks));
  document.getElementById("csvBtn").onclick=exportCSV;
  document.getElementById("backupBtn").onclick=backup;
  document.getElementById("restoreBtn").onclick=()=>document.getElementById("restoreFile").click();
  document.getElementById("restoreFile").onchange=ev=>{if(ev.target.files[0])restore(ev.target.files[0]);ev.target.value="";};
  window.addEventListener("focus",pullIfNewer);
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden)pullIfNewer(); });
}

if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
boot();
